# OpenClaw Agent Configuration Example
# Source-Driven Code Analysis Multi-Agent Framework
#
# Add these entries to your ~/.openclaw/openclaw.json
# Adjust workspace paths and model choices to match your setup.
#
# openclaw.json is JSON5 (trailing commas OK).

# ─────────────────────────────────────────────
# 1. Agent definitions (under "agents.list")
# ─────────────────────────────────────────────
#
# {
#   "agents": {
#     "list": [
#       ... your existing agents ...
#
#       {
#         "id": "jarvis-arch",
#         "name": "Jarvis-Arch",
#         "workspace": "~/.openclaw/agents/jarvis-arch",
#         "model": {
#           "primary": "anthropic/claude-opus-4-6",
#           "fallbacks": ["anthropic/claude-sonnet-4-5"]
#         },
#         "identity": {
#           "name": "Jarvis-Arch",
#           "emoji": "⚡"
#         },
#         "subagents": {
#           "allowAgents": ["researcher", "reviewer"]
#         }
#       },
#       {
#         "id": "researcher",
#         "name": "Researcher",
#         "workspace": "~/.openclaw/agents/researcher",
#         "model": {
#           "primary": "anthropic/claude-opus-4-6",
#           "fallbacks": ["anthropic/claude-sonnet-4-5"]
#         },
#         "identity": {
#           "name": "Researcher",
#           "emoji": "🔬"
#         }
#       },
#       {
#         "id": "reviewer",
#         "name": "Reviewer",
#         "workspace": "~/.openclaw/agents/reviewer",
#         "model": {
#           "primary": "anthropic/claude-opus-4-6",
#           "fallbacks": ["anthropic/claude-sonnet-4-5"]
#         },
#         "identity": {
#           "name": "Reviewer",
#           "emoji": "🔍"
#         }
#       }
#     ]
#   }
# }
#
# KEY: "subagents.allowAgents" on Jarvis-Arch is what lets it spawn
# Researcher and Reviewer as sub-agents. Without this, Jarvis-Arch
# can only see itself when calling agents_list.

# ─────────────────────────────────────────────
# 2. Agent-to-Agent Communication
# ─────────────────────────────────────────────
#
# Enable inter-agent messaging under "tools":
#
# {
#   "tools": {
#     "agentToAgent": {
#       "enabled": true,
#       "allow": ["jarvis-arch", "researcher", "reviewer"]
#     }
#   }
# }
#
# Communication methods (two options):
#
#   a) sessions_send  - direct message to another agent's session
#      Used for: notifications, status updates, lightweight pings
#
#   b) sessions_spawn - spawn another agent as a sub-agent with a task
#      Used for: delegating analysis work, triggering reviews
#      Requires: "subagents.allowAgents" on the calling agent (see above)
#
# Communication flow:
#   jarvis-arch  → researcher   (spawn: assign analysis task)
#   jarvis-arch  → reviewer     (spawn: trigger review)
#   researcher   → reviewer     (send: notify analysis complete)
#   reviewer     → researcher   (send: review feedback)
#
# CLI equivalent:
#   openclaw agent --agent researcher --message "Analyze module X, see task.md"

# ─────────────────────────────────────────────
# 3. Tool Permissions (Design Intent)
# ─────────────────────────────────────────────
#
# By default, OpenClaw agents get standard tool access (read, write, exec).
# The framework's SOUL.md files enforce behavioral constraints:
#
# Jarvis-Arch:
#   - read/write .blackboard/ files (tasks-backlog.md, knowledge-map.md, task.md)
#   - exec: ctags/cscope for SYMBOL_INDEX.md generation
#   - sessions_spawn: orchestrate Researcher and Reviewer as sub-agents
#   - sessions_send: lightweight messaging to other agents
#   - SOUL.md forbids: deep code analysis (delegate to Researcher)
#
# Researcher:
#   - read: source code, blackboard files, knowledge-map.md
#   - exec: grep, find, cat (read-only commands for code exploration)
#   - write: analysis/*.md, tasks-backlog.md (status updates only)
#   - SOUL.md forbids: modifying PROJECT.md, knowledge-map.md, SYMBOL_INDEX.md
#
# Reviewer:
#   - exec: sed -n, grep (MANDATORY for physical code verification)
#   - read: analysis docs, source code, task.md
#   - write: review.md only
#   - SOUL.md forbids: modifying analysis docs, knowledge-map.md
#
# NOTE: If you want hard enforcement (not just SOUL.md behavioral rules),
# use OpenClaw's tools.profile and tools.allow/deny per agent. Example:
#
# {
#   "id": "reviewer",
#   ...
#   "tools": {
#     "allow": ["read", "exec", "write", "sessions_send"]
#   }
# }

# ─────────────────────────────────────────────
# 4. Workspace Layout
# ─────────────────────────────────────────────
#
# Each agent's workspace contains their SOUL.md and MEMORY.md:
#
#   ~/.openclaw/agents/jarvis-arch/
#     ├── SOUL.md        # System prompt (copy from agents/jarvis-arch/SOUL.md)
#     ├── MEMORY.md      # Cross-project lessons (auto-accumulated)
#     └── memory/        # Daily logs
#
# The project workspace is separate (not inside any agent dir):
#
#   ~/projects/<project-name>/
#     ├── PROJECT.md
#     ├── .blackboard/
#     └── analysis/
#
# All agents access the same project directory via paths in task.md.
